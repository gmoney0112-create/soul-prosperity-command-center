name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Opt JavaScript actions into the Node 24 runtime ahead of GitHub's
  # forced migration (default June 2026). This mitigates the runner's
  # "Node.js 20" deprecation warnings without changing action versions.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate static site & serverless
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No lockfile found; falling back to npm install"
            npm install --no-audit --no-fund
          fi

      - name: Run full check (syntax + validator + smoke tests)
        run: npm run check
