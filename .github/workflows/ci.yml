name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No lockfile found; skipping npm ci"
          fi

      - name: Syntax check app.js
        run: node --check app.js

      - name: Syntax check config.js
        run: node --check config.js

      - name: Syntax check validate.js
        run: node --check scripts/validate.js

      - name: Run static site validation
        run: node scripts/validate.js
